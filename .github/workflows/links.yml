name: Broken links

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            --exclude "link.springer.com"
            --exclude "links.yml"
            --exclude "badge.svg"
            --exclude "medium.com"
            --exclude "forbes.com"
            --exclude "reddit.com"
            --exclude "developer.android.com"
            --exclude "mitpress.mit.edu"
            --exclude "anh.cs.luc.edu"
            --exclude "kehittymiskeskustelu.fi"
            --exclude "sicp.comp.nus.edu.sg"
            --exclude "journal.stuffwithstuff.com"
            --exclude "ianlewis.org"
            .
          fail: false

      - name: Set workflow status
        if: steps.lychee.outputs.exit_code != 0
        run: exit 1
